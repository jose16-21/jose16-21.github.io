name: Deploy Vite to GitHub Pages

on:
  push:
    branches: [ "develop" ]

# Permisos necesarios para GitHub Actions
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Localiza el Chrome preinstalado en el runner para el prerender (postbuild).
      # Si no se encuentra, el prerender se omite sin romper el build (deploy CSR).
      - name: Locate Chrome for prerender
        run: |
          CHROME_BIN="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          if [ -n "$CHROME_BIN" ]; then
            echo "CHROME_PATH=$CHROME_BIN" >> "$GITHUB_ENV"
            echo "Chrome encontrado en: $CHROME_BIN"
          else
            echo "No se encontró Chrome; el prerender se omitirá (deploy client-side)."
          fi

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy: ${{ github.event.head_commit.message }}'

